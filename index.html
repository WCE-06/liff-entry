<script>
  const WORKER_URL = 'https://compassion-world-proxy.combetter27.workers.dev/';
  const POINT_GAS_URL = 'https://script.google.com/macros/s/AKfycbwWdVJo6yC6RL3IjJcjueePaIpyo-H7Mh5TGUSqvYEMyZk3Lup8Hcf-JZgsXa-fQB85SA/exec';
  const ENTRANCE_AUDIO_URL = 'https://wce-06.github.io/liff-entry/audio/entrance.mp3';

  const codeInput = document.getElementById('codeInput');
  const submitBtn = document.getElementById('submitBtn');

  const messageMain = document.getElementById('messageMain');
  const messageSub = document.getElementById('messageSub');
  const progressShell = document.getElementById('progressShell');
  const progressFill = document.getElementById('progressFill');
  const progressNum = document.getElementById('progressNum');
  const spinner = document.getElementById('spinner');
  const successMark = document.getElementById('successMark');

  let isSubmitting = false;
  let lastSubmittedCode = '';
  let lastSubmittedAt = 0;
  let resetTimer = null;
  let entranceAudio = null;

  function normalizeCustomerCode(value) {
    return String(value || '')
      .trim()
      .replace(/\r/g, '')
      .replace(/\n/g, '')
      .replace(/\s+/g, '')
      .toUpperCase();
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function focusInput() {
    codeInput.focus({ preventScroll: true });
  }

  function initEntranceAudio() {
    entranceAudio = new Audio(ENTRANCE_AUDIO_URL);
    entranceAudio.preload = 'auto';
    entranceAudio.volume = 1.0;
  }

  function playEntranceAudio() {
    if (!entranceAudio) initEntranceAudio();
    entranceAudio.currentTime = 0;
    entranceAudio.play().catch(() => {});
  }

  function resetVisualState() {
    progressShell.style.display = '';
    progressFill.style.width = '0%';
    progressNum.textContent = '0%';

    spinner.style.display = 'none';
    successMark.style.display = 'none';

    messageMain.textContent = '通行許可証・住民登録証を\nスキャンしてください。';
    messageSub.textContent = '';
    messageSub.classList.remove('error-note');
  }

  function scheduleReset(ms) {
    if (resetTimer) clearTimeout(resetTimer);
    resetTimer = setTimeout(() => {
      codeInput.value = '';
      resetVisualState();
      isSubmitting = false;
      submitBtn.disabled = false;
      focusInput();
    }, ms);
  }

  function playTone(freq, duration, gainValue = 0.035) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.value = gainValue;

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start();

      setTimeout(() => {
        osc.stop();
        ctx.close();
      }, duration);
    } catch (e) {}
  }

  function playSuccessSound() {
    playTone(784, 120);
    setTimeout(() => playTone(1046, 150), 130);
  }

  function playErrorSound() {
    playTone(280, 170, 0.03);
    setTimeout(() => playTone(230, 190, 0.03), 180);
  }

  function isDuplicateRecently(code) {
    const now = Date.now();
    return code && code === lastSubmittedCode && (now - lastSubmittedAt) < 2000;
  }

  function startProgressAnimation() {
    let percent = 0;
    progressFill.style.width = '0%';
    progressNum.textContent = '0%';

    const timer = setInterval(() => {
      percent = Math.min(percent + 4, 96);
      progressFill.style.width = `${percent}%`;
      progressNum.textContent = `${percent}%`;
    }, 80);

    return function stopProgress(complete) {
      clearInterval(timer);
      if (complete) {
        progressFill.style.width = '100%';
        progressNum.textContent = '100%';
      }
    };
  }

  function mapErrorMessage(reason) {
    switch (reason) {
      case 'empty_customer_code':
        return '通行許可証・住民登録証を読み取れませんでした。\nもう一度お試しください。';
      default:
        return 'うまく確認できませんでした。\nもう一度お試しください。';
    }
  }

  async function postEntryCheck(customerCode) {
    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'entry_check', customerCode })
      });

      return await res.json().catch(() => ({ ok: false, error: 'invalid_json' }));
    } catch (err) {
      return {
        ok: false,
        error: String(err && err.message ? err.message : err)
      };
    }
  }

  async function postCheckinPoint(customerCode) {
    try {
      const res = await fetch(POINT_GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'checkin_point',
          customerCode,
          source: 'door_html'
        })
      });

      return await res.json().catch(() => ({ ok: false, error: 'invalid_json' }));
    } catch (err) {
      return {
        ok: false,
        error: String(err && err.message ? err.message : err)
      };
    }
  }

  async function runBackgroundDoorRetries(customerCode) {
    await sleep(2000);
    postEntryCheck(customerCode).catch(() => {});
    await sleep(2000);
    postEntryCheck(customerCode).catch(() => {});
  }

  function showSuccess(customerCode) {
    progressShell.style.display = 'none';
    spinner.style.display = 'none';
    successMark.style.display = 'flex';

    messageMain.textContent = 'ゲートが開きます。\nお足元に気をつけてお進みください。';
    messageSub.textContent = 'COMPASSION WORLDでのひとときを、どうぞごゆっくりお過ごしください。';
    messageSub.classList.remove('error-note');

    playSuccessSound();
    postCheckinPoint(customerCode).catch(() => {});
    runBackgroundDoorRetries(customerCode).catch(() => {});
    scheduleReset(20000);
  }

  function showError(reason) {
    resetVisualState();

    messageMain.textContent = mapErrorMessage(reason);
    messageSub.textContent = '再試行してもゲートが開かない場合、\n公式LINEのカブメニューから、\nヘルプチャットにてお問い合わせください。';
    messageSub.classList.add('error-note');

    playErrorSound();
    scheduleReset(10000);
  }

  async function submitCode(rawCode) {
    const customerCode = normalizeCustomerCode(rawCode);

    if (!customerCode) {
      showError('empty_customer_code');
      return;
    }

    if (isSubmitting) return;

    if (isDuplicateRecently(customerCode)) {
      resetVisualState();
      messageMain.textContent = '確認が重なっているため、\n少し待ってからもう一度お試しください。';
      messageSub.textContent = '';
      messageSub.classList.add('error-note');
      playErrorSound();
      scheduleReset(10000);
      return;
    }

    isSubmitting = true;
    submitBtn.disabled = true;
    lastSubmittedCode = customerCode;
    lastSubmittedAt = Date.now();

    playEntranceAudio();

    resetVisualState();

    messageMain.textContent = '通行許可証・住民登録証をスキャンしました。\nお客さま情報を照会しています。';
    messageSub.textContent = '確認が完了しましたら、ゲートが自動で開きます。';

    const stopProgress = startProgressAnimation();

    const firstResult = await postEntryCheck(customerCode);

    if (firstResult && firstResult.ok) {
      stopProgress(true);
      await sleep(250);
      showSuccess(customerCode);
      return;
    }

    progressShell.style.display = 'none';
    spinner.style.display = 'block';

    const secondResult = await postEntryCheck(customerCode);

    if (secondResult && secondResult.ok) {
      showSuccess(customerCode);
      return;
    }

    await sleep(1000);

    const thirdResult = await postEntryCheck(customerCode);

    if (thirdResult && thirdResult.ok) {
      showSuccess(customerCode);
      return;
    }

    spinner.style.display = 'none';
    showError(thirdResult && (thirdResult.reason || thirdResult.error));
  }

  submitBtn.addEventListener('click', () => {
    submitCode(codeInput.value);
  });

  codeInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      submitCode(codeInput.value);
    }
  });

  codeInput.addEventListener('input', () => {
    codeInput.value = normalizeCustomerCode(codeInput.value);
  });

  window.addEventListener('load', () => {
    initEntranceAudio();
    resetVisualState();
    focusInput();
  });

  window.addEventListener('click', () => {
    if (!isSubmitting) focusInput();
  });
</script>
