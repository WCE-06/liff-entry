<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>通行許可証 有効化</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: sans-serif;
  background:#f5f7fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.card {
  background:white;
  padding:24px;
  border-radius:16px;
  width:90%;
  max-width:400px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}
input {
  width:100%;
  padding:12px;
  font-size:18px;
  margin-top:12px;
  border-radius:8px;
  border:1px solid #ddd;
}
button {
  margin-top:16px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:8px;
  background:#4f46e5;
  color:white;
  font-size:16px;
}
.hidden { display:none; }
</style>
</head>

<body>
<div class="card">

<div id="inputPhase">
  <h2>通行許可証を有効化</h2>
  <p>会員コードを入力してください</p>
  <input id="codeInput" placeholder="例：650A0DB2F6">
  <button onclick="submitCode()">有効化する</button>
</div>

<div id="loadingPhase" class="hidden">
  <p>通行許可証の有効化を行っています。<br>しばらくお待ちください。</p>
</div>

<div id="successPhase" class="hidden">
  <h2>お待たせしました！</h2>
  <p>通行許可証が使えるようになりました。</p>
</div>

<div id="errorPhase" class="hidden">
  <h2>エラー</h2>
  <p id="errorText"></p>
</div>

</div>

<script>
const LIFF_ID = "2008818718-fOO0L9iV";
const GAS_URL = "https://compassion-world-proxy.combetter27.workers.dev/";

async function init() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }
}

function show(id){
  ["inputPhase","loadingPhase","successPhase","errorPhase"].forEach(i=>{
    document.getElementById(i).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

async function submitCode(){
  const code = document.getElementById("codeInput").value.trim();

  if(!code){
    alert("会員コードを入力してください");
    return;
  }

  show("loadingPhase");

  try{
    const idToken = liff.getIDToken();

    const res = await fetch(GAS_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        action:"link_line",
        idToken:idToken,
        customerCode:code
      })
    });

    const data = await res.json();

    if(data.ok){
      show("successPhase");
    } else {
      show("errorPhase");
      document.getElementById("errorText").innerText = data.error;
    }

  }catch(e){
    show("errorPhase");
    document.getElementById("errorText").innerText = e;
  }
}

init();
</script>
</body>
</html>
