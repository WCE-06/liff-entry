<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COMPASSION WORLD 会員処理テスト</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --ok: #22c55e;
      --ng: #ef4444;
      --busy: #f59e0b;
      --border: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      padding: 24px;
    }

    .wrap {
      max-width: 780px;
      margin: 0 auto;
      background: rgba(17,24,39,0.95);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      text-align: center;
    }

    .sub {
      text-align: center;
      color: var(--muted);
      margin-bottom: 22px;
    }

    .modes {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .mode-btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .mode-btn.active {
      background: rgba(56,189,248,0.18);
      border-color: rgba(56,189,248,0.35);
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      background: rgba(255,255,255,0.02);
    }

    .status {
      margin-bottom: 18px;
      padding: 20px;
      border-radius: 18px;
      border: 1px solid var(--border);
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .status.idle {}
    .status.busy { border-color: rgba(245,158,11,0.35); }
    .status.ok { border-color: rgba(34,197,94,0.4); }
    .status.ng { border-color: rgba(239,68,68,0.4); }

    .badge {
      display: inline-block;
      align-self: center;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 800;
      background: rgba(56,189,248,0.18);
    }

    .status.busy .badge { background: rgba(245,158,11,0.2); }
    .status.ok .badge { background: rgba(34,197,94,0.2); }
    .status.ng .badge { background: rgba(239,68,68,0.2); }

    .main {
      text-align: center;
      font-size: 30px;
      font-weight: 800;
      margin: 0;
    }

    .subtext {
      text-align: center;
      color: var(--muted);
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    input {
      height: 52px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }

    input:focus {
      border-color: rgba(56,189,248,0.45);
      box-shadow: 0 0 0 4px rgba(56,189,248,0.08);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    button.action {
      height: 52px;
      border: none;
      border-radius: 14px;
      padding: 0 18px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
      background: var(--accent);
      color: #082f49;
    }

    button.subtle {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .raw {
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(0,0,0,0.25);
      color: #cbd5e1;
      font-size: 13px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>COMPASSION WORLD</h1>
    <div class="sub">GitHub Pages から入店・ランク変更・同期をテスト</div>

    <div class="modes">
      <button class="mode-btn" data-mode="entry">entry</button>
      <button class="mode-btn" data-mode="upgrade">upgrade</button>
      <button class="mode-btn" data-mode="downgrade">downgrade</button>
      <button class="mode-btn" data-mode="sync_all">sync_all</button>
    </div>

    <div id="statusBox" class="status idle">
      <div id="badge" class="badge">待機中</div>
      <p id="mainText" class="main">操作を選んでください</p>
      <p id="subText" class="subtext">バーコード読み取りまたはボタン操作でテストできます</p>
    </div>

    <div class="card">
      <div class="grid">
        <label>
          会員番号
          <input id="customerCode" type="text" placeholder="例: 650A0DB2F6" autocomplete="off" />
        </label>

        <label id="expiresWrap">
          expiresAt
          <input id="expiresAt" type="text" placeholder="例: 2026-12-31" autocomplete="off" />
        </label>

        <label id="noteWrap">
          note
          <input id="note" type="text" placeholder="任意" autocomplete="off" />
        </label>
      </div>

      <div class="actions">
        <button id="execBtn" class="action">実行</button>
        <button id="clearBtn" class="action subtle">クリア</button>
      </div>

      <pre id="rawResult" class="raw">結果がここに表示されます</pre>
    </div>

    <div class="note">
      entry は USBバーコードリーダーの Enter 確定にも対応しています
    </div>
  </div>

  <script>
    const WORKER_URL = 'https://compassion-world-proxy.combetter27.workers.dev/';
    const params = new URLSearchParams(location.search);

    const customerCodeEl = document.getElementById('customerCode');
    const expiresAtEl = document.getElementById('expiresAt');
    const noteEl = document.getElementById('note');
    const execBtn = document.getElementById('execBtn');
    const clearBtn = document.getElementById('clearBtn');
    const rawResult = document.getElementById('rawResult');
    const statusBox = document.getElementById('statusBox');
    const badge = document.getElementById('badge');
    const mainText = document.getElementById('mainText');
    const subText = document.getElementById('subText');
    const expiresWrap = document.getElementById('expiresWrap');
    const noteWrap = document.getElementById('noteWrap');

    let mode = params.get('mode') || 'entry';
    let isSubmitting = false;
    let lastSubmittedCode = '';
    let lastSubmittedAt = 0;

    function normalizeCustomerCode(value) {
      return String(value || '')
        .trim()
        .replace(/\r/g, '')
        .replace(/\n/g, '')
        .replace(/\s+/g, '')
        .toUpperCase();
    }

    function setStatus(type, main, sub) {
      statusBox.className = `status ${type}`;
      badge.textContent =
        type === 'busy' ? '処理中' :
        type === 'ok' ? '成功' :
        type === 'ng' ? '失敗' :
        '待機中';
      mainText.textContent = main;
      subText.textContent = sub || '';
    }

    function refreshModeUI() {
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });

      expiresWrap.style.display = mode === 'upgrade' ? 'grid' : 'none';
      noteWrap.style.display = (mode === 'upgrade' || mode === 'downgrade') ? 'grid' : 'none';

      if (mode === 'sync_all') {
        customerCodeEl.disabled = true;
        expiresAtEl.disabled = true;
        noteEl.disabled = true;
        customerCodeEl.value = '';
      } else {
        customerCodeEl.disabled = false;
        expiresAtEl.disabled = mode !== 'upgrade';
        noteEl.disabled = !(mode === 'upgrade' || mode === 'downgrade');
      }

      if (mode === 'entry') {
        setStatus('idle', 'バーコードを読み取ってください', 'USBバーコードリーダーの入力を受け付けています');
      } else if (mode === 'upgrade') {
        setStatus('idle', 'ランクアップを実行します', '会員番号を入力して実行してください');
      } else if (mode === 'downgrade') {
        setStatus('idle', 'ランクダウンを実行します', '会員番号を入力して実行してください');
      } else {
        setStatus('idle', '全件同期を実行します', '実行ボタンで同期できます');
      }
    }

    function showRaw(data) {
      rawResult.textContent = JSON.stringify(data, null, 2);
    }

    function isDuplicateRecently(code) {
      const now = Date.now();
      return code &&
        code === lastSubmittedCode &&
        (now - lastSubmittedAt) < 2000;
    }

    async function executeAction() {
      if (isSubmitting) return;

      const customerCode = normalizeCustomerCode(customerCodeEl.value);
      const expiresAt = String(expiresAtEl.value || '').trim();
      const note = String(noteEl.value || '').trim();

      if (mode !== 'sync_all' && !customerCode) {
        setStatus('ng', '会員番号が未入力です', 'customerCode を確認してください');
        return;
      }

      if (mode === 'entry' && isDuplicateRecently(customerCode)) {
        setStatus('ng', '連続読み取りを制限中です', '少し待ってから再実行してください');
        return;
      }

      isSubmitting = true;
      execBtn.disabled = true;
      lastSubmittedCode = customerCode;
      lastSubmittedAt = Date.now();

      setStatus('busy', '処理中です', `${mode} を実行しています...`);

      try {
        let response;
        if (mode === 'entry') {
          response = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'entry_check',
              customerCode
            })
          });
        } else {
          const url = new URL(WORKER_URL);
          url.searchParams.set('action', mode);
          if (customerCode) url.searchParams.set('customerCode', customerCode);
          if (expiresAt) url.searchParams.set('expiresAt', expiresAt);
          if (note) url.searchParams.set('note', note);
          response = await fetch(url.toString(), { method: 'GET' });
        }

        const data = await response.json().catch(() => ({ ok: false, error: 'invalid_json' }));
        showRaw(data);

        if (data.ok) {
          if (mode === 'entry') {
            setStatus('ok', 'どうぞお入りください', data.name ? `${data.name} さんを確認しました` : '会員確認が完了しました');
          } else if (mode === 'upgrade') {
            setStatus('ok', 'ランクアップしました', customerCode || '完了');
          } else if (mode === 'downgrade') {
            setStatus('ok', 'ランクダウンしました', customerCode || '完了');
          } else {
            setStatus('ok', '同期が完了しました', data.synced ? `synced=${data.synced}` : '完了');
          }
        } else {
          setStatus('ng', '処理に失敗しました', data.error || data.reason || 'unknown_error');
        }
      } catch (err) {
        const data = { ok: false, error: String(err && err.message ? err.message : err) };
        showRaw(data);
        setStatus('ng', '通信に失敗しました', data.error);
      } finally {
        isSubmitting = false;
        execBtn.disabled = false;
      }
    }

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        mode = btn.dataset.mode;
        const u = new URL(location.href);
        u.searchParams.set('mode', mode);
        history.replaceState({}, '', u.toString());
        refreshModeUI();
      });
    });

    execBtn.addEventListener('click', executeAction);

    clearBtn.addEventListener('click', () => {
      customerCodeEl.value = '';
      expiresAtEl.value = '';
      noteEl.value = '';
      rawResult.textContent = '結果がここに表示されます';
      refreshModeUI();
      customerCodeEl.focus();
    });

    customerCodeEl.addEventListener('input', () => {
      customerCodeEl.value = normalizeCustomerCode(customerCodeEl.value);
    });

    customerCodeEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        executeAction();
      }
    });

    window.addEventListener('load', () => {
      refreshModeUI();
      customerCodeEl.focus();
    });

    window.addEventListener('click', () => {
      if (!customerCodeEl.disabled) customerCodeEl.focus();
    });
  </script>
</body>
</html>
