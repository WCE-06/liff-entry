<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>COMPASSION WORLD 入店認証</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --ok: #22c55e;
      --ng: #ef4444;
      --busy: #f59e0b;
      --border: rgba(255,255,255,0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 760px;
      background: rgba(17, 24, 39, 0.94);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.35);
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.02em;
      margin: 0 0 10px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--muted);
      margin: 0;
    }

    .status-card {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      min-height: 240px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
      transition: all 0.2s ease;
      background: rgba(255,255,255,0.02);
    }

    .status-card.idle {
      border-color: rgba(56, 189, 248, 0.25);
      box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.06);
    }

    .status-card.busy {
      border-color: rgba(245, 158, 11, 0.35);
      box-shadow: 0 0 0 1px rgba(245, 158, 11, 0.08);
    }

    .status-card.ok {
      border-color: rgba(34, 197, 94, 0.4);
      box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.1);
    }

    .status-card.ng {
      border-color: rgba(239, 68, 68, 0.4);
      box-shadow: 0 0 0 1px rgba(239, 68, 68, 0.1);
    }

    .status-badge {
      align-self: center;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: white;
      background: rgba(56, 189, 248, 0.25);
    }

    .status-badge.busy { background: rgba(245, 158, 11, 0.22); }
    .status-badge.ok { background: rgba(34, 197, 94, 0.24); }
    .status-badge.ng { background: rgba(239, 68, 68, 0.24); }

    .message-main {
      text-align: center;
      font-size: 36px;
      font-weight: 800;
      line-height: 1.3;
      margin: 0;
    }

    .message-sub {
      text-align: center;
      font-size: 18px;
      color: var(--muted);
      margin: 0;
      min-height: 1.5em;
    }

    .code-box {
      margin-top: 20px;
      display: grid;
      gap: 10px;
    }

    .label {
      font-size: 13px;
      color: var(--muted);
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .code-input {
      flex: 1;
      min-width: 240px;
      height: 56px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 0 16px;
      font-size: 20px;
      outline: none;
    }

    .code-input:focus {
      border-color: rgba(56, 189, 248, 0.5);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.08);
    }

    .btn {
      height: 56px;
      border: none;
      border-radius: 14px;
      padding: 0 20px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #082f49;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .small {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 10px;
      word-break: break-all;
    }

    @media (max-width: 640px) {
      .app {
        padding: 18px;
        border-radius: 18px;
      }

      .title {
        font-size: 24px;
      }

      .message-main {
        font-size: 28px;
      }

      .message-sub {
        font-size: 16px;
      }

      .code-input, .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1 class="title">COMPASSION WORLD</h1>
      <p class="subtitle">会員証のバーコードを読み取ってください</p>
    </header>

    <section id="statusCard" class="status-card idle">
      <div id="statusBadge" class="status-badge">待機中</div>
      <p id="messageMain" class="message-main">バーコードを読み取ってください</p>
      <p id="messageSub" class="message-sub">USBバーコードリーダーの入力を受け付けています</p>
    </section>

    <section class="code-box">
      <div class="label">読み取りコード</div>
      <div class="input-wrap">
        <input
          id="codeInput"
          class="code-input"
          type="text"
          inputmode="text"
          autocomplete="off"
          autocapitalize="characters"
          spellcheck="false"
          placeholder="ここに自動入力されます"
        />
        <button id="submitBtn" class="btn" type="button">認証する</button>
      </div>
      <div id="debugText" class="small">mode: entry</div>
    </section>

    <div class="footer">
      読み取り後、自動で入店判定を行います
    </div>
  </main>

  <script>
    const WORKER_URL = 'https://compassion-world-proxy.combetter27.workers.dev/';
    const MODE = new URLSearchParams(location.search).get('mode') || 'entry';

    const codeInput = document.getElementById('codeInput');
    const submitBtn = document.getElementById('submitBtn');
    const statusCard = document.getElementById('statusCard');
    const statusBadge = document.getElementById('statusBadge');
    const messageMain = document.getElementById('messageMain');
    const messageSub = document.getElementById('messageSub');
    const debugText = document.getElementById('debugText');

    let isSubmitting = false;
    let lastSubmittedCode = '';
    let lastSubmittedAt = 0;
    let resetTimer = null;

    debugText.textContent = `mode: ${MODE}`;

    function normalizeCustomerCode(value) {
      return String(value || '')
        .trim()
        .replace(/\r/g, '')
        .replace(/\n/g, '')
        .replace(/\s+/g, '')
        .toUpperCase();
    }

    function setStatus(type, main, sub) {
      statusCard.className = `status-card ${type}`;
      statusBadge.className = `status-badge ${type}`;
      statusBadge.textContent =
        type === 'busy' ? '認証中' :
        type === 'ok' ? '入店可' :
        type === 'ng' ? '入店不可' :
        '待機中';

      messageMain.textContent = main;
      messageSub.textContent = sub || '';
    }

    function focusInput() {
      codeInput.focus({ preventScroll: true });
    }

    function clearAndReset(ms = 2500) {
      if (resetTimer) {
        clearTimeout(resetTimer);
      }

      resetTimer = setTimeout(() => {
        codeInput.value = '';
        setStatus('idle', 'バーコードを読み取ってください', 'USBバーコードリーダーの入力を受け付けています');
        focusInput();
      }, ms);
    }

    function playTone(freq, duration) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.value = 0.04;

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start();

        setTimeout(() => {
          osc.stop();
          ctx.close();
        }, duration);
      } catch (e) {
      }
    }

    function playSuccessSound() {
      playTone(880, 100);
      setTimeout(() => playTone(1174, 120), 110);
    }

    function playErrorSound() {
      playTone(280, 160);
      setTimeout(() => playTone(220, 180), 170);
    }

    function isDuplicateRecently(code) {
      const now = Date.now();
      return code &&
        code === lastSubmittedCode &&
        (now - lastSubmittedAt) < 2000;
    }

    async function submitCode(rawCode) {
      const customerCode = normalizeCustomerCode(rawCode);

      if (!customerCode) {
        setStatus('ng', 'コードを確認できませんでした', 'バーコードをもう一度読み取ってください');
        playErrorSound();
        clearAndReset(2200);
        return;
      }

      if (isSubmitting) {
        return;
      }

      if (isDuplicateRecently(customerCode)) {
        setStatus('ng', '連続読み取りを制限中です', '少し待ってからもう一度お試しください');
        playErrorSound();
        clearAndReset(1500);
        return;
      }

      isSubmitting = true;
      submitBtn.disabled = true;
      lastSubmittedCode = customerCode;
      lastSubmittedAt = Date.now();

      setStatus('busy', '会員確認中です', 'しばらくお待ちください');

      try {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            action: 'entry_check',
            customerCode
          })
        });

        const data = await response.json().catch(() => ({}));

        if (data && data.ok) {
          setStatus('ok', 'どうぞお入りください', data.name ? `${data.name} さんを確認しました` : '会員確認が完了しました');
          playSuccessSound();
          clearAndReset(3000);
        } else {
          const reason = String(data && data.reason ? data.reason : data && data.error ? data.error : 'unknown');
          const message = mapErrorMessage(reason, data);
          setStatus('ng', message.main, message.sub);
          playErrorSound();
          clearAndReset(3200);
        }

      } catch (err) {
        setStatus('ng', '通信に失敗しました', 'ネットワークまたはサーバーの状態をご確認ください');
        playErrorSound();
        clearAndReset(3200);
      } finally {
        isSubmitting = false;
        submitBtn.disabled = false;
      }
    }

    function mapErrorMessage(reason, data) {
      switch (reason) {
        case 'customer_not_found':
          return {
            main: '会員情報が見つかりません',
            sub: '会員番号をご確認ください'
          };
        case 'rank_not_allowed':
          return {
            main: '現在は入店できません',
            sub: data && data.rank ? `ランク: ${data.rank}` : '会員状態をご確認ください'
          };
        case 'empty_customer_code':
          return {
            main: 'コードを読み取れませんでした',
            sub: 'もう一度バーコードを読み取ってください'
          };
        default:
          return {
            main: '入店できませんでした',
            sub: `理由: ${reason}`
          };
      }
    }

    submitBtn.addEventListener('click', () => {
      submitCode(codeInput.value);
    });

    codeInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        submitCode(codeInput.value);
      }
    });

    codeInput.addEventListener('input', () => {
      codeInput.value = normalizeCustomerCode(codeInput.value);
    });

    window.addEventListener('click', focusInput);
    window.addEventListener('load', () => {
      focusInput();
      setStatus('idle', 'バーコードを読み取ってください', 'USBバーコードリーダーの入力を受け付けています');
    });
  </script>
</body>
</html>
